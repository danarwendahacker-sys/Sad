<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ X ARCH - TARUHAN DENGAN TITIK ✨</title>
    <style>
        /* Tema biru luar angkasa (sama seperti sebelumnya) */
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #0a1f3d 0%, #030711 100%);
            position: relative;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 10px 30px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 20px 80px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 240px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 250px 50px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 350px 430px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 450px 120px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 550px 270px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 650px 70px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 750px 390px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 850px 180px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 550px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 680px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 280px 780px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 400px 820px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 520px 920px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 660px 540px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 780px 660px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 890px 750px, #aaccff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 950px 850px, #aaccff, rgba(0,0,0,0));
            background-repeat: repeat;
            opacity: 0.4;
            pointer-events: none;
            animation: twinkle 5s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.6; }
        }
        .game-container {
            position: relative;
            z-index: 2;
            max-width: 520px;
            width: 100%;
            background: rgba(8, 20, 40, 0.85);
            backdrop-filter: blur(6px);
            border: 2px solid #3a80d0;
            border-radius: 35px;
            padding: 25px 20px;
            box-shadow: 0 0 40px #3a80d0;
            text-align: center;
        }
        h1 {
            color: #6ab0ff;
            text-shadow: 0 0 15px #3a80d0;
            font-size: 2.5em;
            margin: 0 0 15px;
            letter-spacing: 3px;
            font-weight: 800;
        }
        .balance-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .balance {
            font-size: 24px;
            background: rgba(0, 30, 60, 0.8);
            padding: 8px 25px;
            border-radius: 40px;
            border: 1px solid #3a80d0;
            box-shadow: 0 0 15px #3a80d0;
            font-weight: bold;
            color: #c0e0ff;
        }
        .free-btn {
            background: #2a6f97;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px #2a6f97;
            transition: 0.3s;
            border: 1px solid #8ac4ff;
        }
        .free-btn:hover:not(:disabled) {
            background: #3a8fc7;
            transform: scale(1.05);
        }
        .free-btn:disabled {
            background: #345;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .streak {
            font-size: 20px;
            color: #8ac4ff;
            margin: 10px 0;
            text-shadow: 0 0 8px #3a80d0;
        }
        .star {
            font-size: 90px;
            margin: 5px 0 0;
            animation: glow 1.5s infinite;
            filter: drop-shadow(0 0 15px #6ab0ff);
            position: relative;
            top: -15px;
        }
        @keyframes glow {
            0% { filter: drop-shadow(0 0 5px #6ab0ff); }
            50% { filter: drop-shadow(0 0 30px #3a80d0); }
            100% { filter: drop-shadow(0 0 5px #6ab0ff); }
        }
        .multiplier {
            font-size: 56px;
            font-weight: bold;
            color: #8ac4ff;
            text-shadow: 0 0 15px #00aaff;
            margin: 0 0 10px;
        }
        .countdown {
            font-size: 26px;
            color: #ffaa00;
            font-weight: bold;
            min-height: 40px;
        }
        .bet-input {
            margin: 15px 0 10px;
        }
        .bet-input input {
            width: 240px;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            text-align: center;
            background: rgba(20, 40, 70, 0.7);
            color: white;
            border: 1px solid #3a80d0;
            outline: none;
        }
        .bet-input input::placeholder {
            color: #aaa;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 15px 0;
        }
        .action-buttons button {
            flex: 1;
            max-width: 180px;
            padding: 14px 0;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px currentColor;
        }
        #betBtn {
            background: #3a80d0;
            color: white;
            box-shadow: 0 0 20px #3a80d0;
        }
        #betBtn:hover:not(:disabled) {
            background: #5a9ef0;
            transform: scale(1.02);
        }
        #cashoutBtn {
            background: #00b4d8;
            color: #000;
            box-shadow: 0 0 20px #00b4d8;
        }
        #cashoutBtn:hover:not(:disabled) {
            background: #48cae4;
            transform: scale(1.02);
        }
        button:disabled {
            background: #345 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .message {
            margin: 20px 0;
            padding: 12px;
            background: rgba(10, 30, 55, 0.9);
            border-radius: 50px;
            border-left: 6px solid #3a80d0;
            font-size: 16px;
            text-align: left;
            word-break: break-word;
            color: #c0e0ff;
        }
        .withdraw-area {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px dashed #3a80d0;
        }
        .withdraw-area h3 {
            color: #6ab0ff;
            margin: 0 0 15px;
            font-size: 22px;
        }
        .withdraw-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .withdraw-row input {
            padding: 14px 20px;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            background: rgba(20, 40, 70, 0.7);
            color: white;
            border: 1px solid #00b4d8;
            outline: none;
        }
        #withdrawAmount {
            width: 160px;
            text-align: center;
        }
        #withdrawPhone {
            width: 220px;
            flex: 2;
            min-width: 200px;
        }
        .withdraw-row button {
            background: #00b4d8;
            color: #000;
            border: none;
            border-radius: 60px;
            padding: 14px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px #00b4d8;
            transition: 0.3s;
            border: 1px solid #8ac4ff;
        }
        .withdraw-row button:hover {
            background: #48cae4;
            transform: scale(1.02);
        }
        .limit-note {
            font-size: 14px;
            color: #aaccff;
            margin-top: 8px;
        }
        .cheat-indicator {
            background: #2a6f97;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            margin: 10px auto;
            width: fit-content;
            box-shadow: 0 0 25px #3a80d0;
            font-size: 18px;
        }
        .menu-button {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 40px;
            cursor: pointer;
            background: rgba(0, 30, 60, 0.7);
            border: none;
            color: #6ab0ff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px #3a80d0;
            z-index: 10;
            transition: 0.3s;
        }
        .menu-button:hover {
            background: rgba(58, 128, 208, 0.4);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <button class="menu-button" id="menuBtn" onclick="openCheatMenu()">☰</button>

    <div class="game-container">
        <h1>✨ X ARCH ✨</h1>
        
        <div class="balance-area">
            <div class="balance">💰 Rp <span id="balance">0</span></div>
            <button class="free-btn" id="freeClaimBtn" onclick="claimFreeSaldo()">🎁 Free Rp5.000</button>
        </div>
        
        <div class="streak" id="streakDisplay">🔥 Streak: 0</div>
        
        <div class="star" id="star">⭐</div>
        <div class="multiplier" id="multiplier">1.00x</div>
        <div class="countdown" id="countdown"></div>
        
        <!-- Input taruhan dengan format titik (type="text") -->
        <div class="bet-input">
            <input type="text" id="betAmount" value="2.000" placeholder="Rp 2.000 - 10.000.000" oninput="formatBetInput(this)">
        </div>
        
        <div class="action-buttons">
            <button id="betBtn" onclick="placeBet()" disabled>🔽 Pasang</button>
            <button id="cashoutBtn" onclick="cashOut()" disabled>💸 Tarik</button>
        </div>
        
        <div class="message" id="message">👋 Selamat datang! Ronde dimulai otomatis.</div>
        
        <div id="cheatMessage" class="cheat-indicator" style="display: none;">🔮 CHEAT 90x AKTIF! (Game berikutnya)</div>
        
        <div class="withdraw-area">
            <h3>📱 TARIK KE NOMOR HP</h3>
            <div class="withdraw-row">
                <input type="number" id="withdrawAmount" min="100000" max="10000000" step="10000" value="100000" placeholder="Jumlah (100rb-10jt)">
                <input type="tel" id="withdrawPhone" placeholder="Nomor HP">
            </div>
            <div class="withdraw-row">
                <button onclick="withdrawToPhone()">💳 Tarik Sekarang</button>
            </div>
            <div class="limit-note">* Minimal Rp100.000, maksimal Rp10.000.000. Saldo harus cukup.</div>
        </div>
    </div>

    <script>
        // ==================== INISIALISASI & LOCALSTORAGE ====================
        let balance = parseInt(localStorage.getItem('xarch_balance')) || 0;
        let winStreak = parseInt(localStorage.getItem('xarch_streak')) || 0;
        let freeClaimed = localStorage.getItem('xarch_freeClaimed') === 'true';

        // State game
        let currentBet = 0;
        let gameActive = false;
        let countdownActive = false;
        let cooldownActive = false;
        let hasCashedOut = false;
        let countdownInterval = null;
        let gameInterval = null;
        let cooldownTimer = null;
        let crashMultiplier = 1.0;
        let currentMultiplier = 1.0;
        let countdown = 3;

        // Cheat
        let cheatActive = false;
        const CHEAT_PASSWORD = "9090p";

        // Batas taruhan dan withdraw
        const MIN_BET = 2000;
        const MAX_BET = 10000000;
        const MIN_WITHDRAW = 100000;
        const MAX_WITHDRAW = 10000000;

        // Elemen DOM
        const balanceEl = document.getElementById('balance');
        const multiplierEl = document.getElementById('multiplier');
        const countdownEl = document.getElementById('countdown');
        const messageEl = document.getElementById('message');
        const betBtn = document.getElementById('betBtn');
        const cashoutBtn = document.getElementById('cashoutBtn');
        const betInput = document.getElementById('betAmount');
        const streakDisplay = document.getElementById('streakDisplay');
        const cheatMessage = document.getElementById('cheatMessage');
        const freeClaimBtn = document.getElementById('freeClaimBtn');
        const withdrawAmountInput = document.getElementById('withdrawAmount');
        const withdrawPhoneInput = document.getElementById('withdrawPhone');

        // Format angka dengan titik (untuk tampilan)
        function formatRupiah(angka) {
            return angka.toLocaleString('id-ID');
        }

        // Fungsi untuk memformat input taruhan (menambahkan titik)
        function formatBetInput(input) {
            // Hapus semua karakter non-digit
            let value = input.value.replace(/\D/g, '');
            if (value === '') {
                input.value = '';
                return;
            }
            // Ubah menjadi angka
            let num = parseInt(value, 10);
            // Batasi sesuai MIN_BET dan MAX_BET (tapi tidak dipaksa, hanya untuk format)
            if (num < MIN_BET) num = MIN_BET;
            if (num > MAX_BET) num = MAX_BET;
            // Format dengan titik
            input.value = formatRupiah(num);
        }

        // Ambil nilai numerik dari input taruhan
        function getBetValue() {
            let value = betInput.value.replace(/\D/g, '');
            return value === '' ? 0 : parseInt(value, 10);
        }

        function updateBalance() {
            balanceEl.textContent = formatRupiah(balance);
            localStorage.setItem('xarch_balance', balance);
        }

        function updateStreak() {
            streakDisplay.textContent = `🔥 Streak: ${winStreak}`;
            localStorage.setItem('xarch_streak', winStreak);
        }

        function saveFreeClaimed() {
            localStorage.setItem('xarch_freeClaimed', freeClaimed);
        }

        // Cheat via menu
        function openCheatMenu() {
            const password = prompt("Masukkan password cheat:", "");
            if (password === CHEAT_PASSWORD) {
                cheatActive = true;
                cheatMessage.style.display = 'block';
                messageEl.textContent = '🔮 Cheat 90x diaktifkan! Game berikutnya akan crash di 90x.';
            } else if (password !== null) {
                alert("Password salah!");
            }
        }

        // Klaim free saldo
        function claimFreeSaldo() {
            if (freeClaimed) {
                messageEl.textContent = '❌ Kamu sudah klaim free saldo!';
                return;
            }
            balance += 5000;
            updateBalance();
            freeClaimed = true;
            freeClaimBtn.disabled = true;
            freeClaimBtn.textContent = '✓ Sudah Diklaim';
            messageEl.textContent = '✅ Dapat free Rp5.000! Silakan pasang taruhan.';
            saveFreeClaimed();
            if (!cooldownActive && !countdownActive && !gameActive) {
                betBtn.disabled = (balance < MIN_BET);
            }
        }

        // Generate multiplier crash
        function generateCrashMultiplier() {
            if (cheatActive) {
                cheatActive = false;
                cheatMessage.style.display = 'none';
                return 90.0;
            }

            const r = Math.random();
            let crash;

            if (winStreak >= 20) {
                if (r < 0.8) {
                    crash = 1 + Math.random() * 0.5;
                } else if (r < 0.95) {
                    crash = 1.5 + Math.random() * 1.0;
                } else if (r < 0.99) {
                    crash = 2.5 + Math.random() * 1.5;
                } else {
                    crash = 4 + Math.random() * 6;
                }
            } else {
                if (r < 0.7) {
                    crash = 1 + Math.random() * 1;
                } else if (r < 0.9) {
                    crash = 2 + Math.random() * 3;
                } else if (r < 0.97) {
                    crash = 5 + Math.random() * 5;
                } else if (r < 0.99) {
                    crash = 10 + Math.random() * 10;
                } else if (r < 0.999) {
                    crash = 20 + Math.random() * 30;
                } else {
                    crash = 50 + Math.random() * 40;
                }
            }
            return Math.round(crash * 100) / 100;
        }

        // ==================== COOLDOWN 2 DETIK ====================
        function startCooldown() {
            cooldownActive = true;
            betBtn.disabled = true;
            cashoutBtn.disabled = true;
            countdownEl.textContent = '⏳ Tunggu 2 detik...';
            
            cooldownTimer = setTimeout(() => {
                cooldownActive = false;
                countdownEl.textContent = '';
                startCountdown();
            }, 2000);
        }

        // ==================== RONDE OTOMATIS ====================
        function startCountdown() {
            if (cooldownActive) return;
            if (countdownActive) return;
            countdownActive = true;
            gameActive = false;
            hasCashedOut = false;
            countdown = 3;

            countdownEl.textContent = `⏳ Ronde baru dalam ${countdown} detik...`;
            multiplierEl.textContent = '1.00x';
            betBtn.disabled = (balance < MIN_BET);
            cashoutBtn.disabled = true;

            countdownInterval = setInterval(() => {
                countdown--;
                countdownEl.textContent = `⏳ Ronde baru dalam ${countdown} detik...`;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    countdownActive = false;
                    countdownEl.textContent = '';
                    startRound();
                }
            }, 1000);
        }

        function startRound() {
            gameActive = true;
            hasCashedOut = false;
            crashMultiplier = generateCrashMultiplier();
            console.log('Crash at:', crashMultiplier);
            currentMultiplier = 1.0;
            multiplierEl.textContent = currentMultiplier.toFixed(2) + 'x';

            if (currentBet > 0) {
                cashoutBtn.disabled = false;
            } else {
                cashoutBtn.disabled = true;
            }
            betBtn.disabled = true;

            gameInterval = setInterval(() => {
                if (!gameActive) return;
                currentMultiplier = Math.round((currentMultiplier + 0.1) * 100) / 100;
                multiplierEl.textContent = currentMultiplier.toFixed(2) + 'x';

                if (currentMultiplier >= crashMultiplier) {
                    gameActive = false;
                    clearInterval(gameInterval);
                    gameInterval = null;
                    multiplierEl.textContent = crashMultiplier.toFixed(2) + 'x (CRASH!)';

                    if (currentBet > 0 && !hasCashedOut) {
                        messageEl.textContent = `💥 Bintang jatuh! Anda kalah Rp ${formatRupiah(currentBet)}`;
                        winStreak = 0;
                        updateStreak();
                        currentBet = 0;
                    } else {
                        messageEl.textContent = `💥 Ronde berakhir di ${crashMultiplier.toFixed(2)}x.`;
                    }

                    startCooldown();
                }
            }, 100);
        }

        // Pasang taruhan (hanya saat countdown) dengan input bertitik
        function placeBet() {
            if (!countdownActive) {
                messageEl.textContent = '❌ Hanya bisa pasang saat hitung mundur!';
                return;
            }
            if (currentBet > 0) {
                messageEl.textContent = '❌ Kamu sudah pasang taruhan untuk ronde ini!';
                return;
            }
            let bet = getBetValue();
            if (bet < MIN_BET || bet > MAX_BET) {
                messageEl.textContent = `❌ Taruhan harus antara Rp ${formatRupiah(MIN_BET)} - Rp ${formatRupiah(MAX_BET)}`;
                // Kembalikan input ke nilai sebelumnya? Tidak perlu, biarkan user memperbaiki
                return;
            }
            if (bet > balance) {
                messageEl.textContent = `❌ Saldo tidak cukup! Saldo Anda Rp ${formatRupiah(balance)}`;
                return;
            }

            balance -= bet;
            updateBalance();
            currentBet = bet;
            messageEl.textContent = `✅ Taruhan Rp ${formatRupiah(bet)} dipasang. Ronde dimulai sebentar...`;
            betBtn.disabled = true;
        }

        // Tarik tunai saat ronde berlangsung
        function cashOut() {
            if (!gameActive) {
                messageEl.textContent = '❌ Tidak ada ronde aktif';
                return;
            }
            if (hasCashedOut) {
                messageEl.textContent = '❌ Kamu sudah menarik di ronde ini';
                return;
            }
            if (currentBet <= 0) {
                messageEl.textContent = '❌ Kamu belum pasang taruhan';
                return;
            }

            hasCashedOut = true;
            cashoutBtn.disabled = true;

            const winAmount = Math.floor(currentBet * currentMultiplier);
            balance += winAmount;
            updateBalance();
            messageEl.textContent = `🎉 Anda menarik pada ${currentMultiplier.toFixed(2)}x! Menang Rp ${formatRupiah(winAmount)}`;
            
            winStreak++;
            updateStreak();
            
            currentBet = 0;
        }

        // Penarikan ke nomor HP
        function withdrawToPhone() {
            if (balance <= 0) {
                messageEl.textContent = '❌ Saldo 0, tidak bisa tarik';
                return;
            }

            const phone = withdrawPhoneInput.value.trim();
            if (!phone || phone.length < 10) {
                messageEl.textContent = '❌ Nomor HP tidak valid (min 10 digit)';
                return;
            }

            const amount = parseInt(withdrawAmountInput.value);
            if (isNaN(amount) || amount < MIN_WITHDRAW || amount > MAX_WITHDRAW) {
                messageEl.textContent = `❌ Jumlah harus antara Rp ${formatRupiah(MIN_WITHDRAW)} - Rp ${formatRupiah(MAX_WITHDRAW)}`;
                return;
            }

            if (amount > balance) {
                messageEl.textContent = `❌ Saldo tidak cukup! Saldo Anda Rp ${formatRupiah(balance)}`;
                return;
            }

            balance -= amount;
            updateBalance();
            messageEl.textContent = `✅ Rp ${formatRupiah(amount)} berhasil ditarik ke nomor ${phone}. ${balance > 0 ? 'Sisa saldo Rp ' + formatRupiah(balance) : 'Saldo habis.'}`;

            if (balance === 0) {
                betBtn.disabled = true;
            } else {
                if (countdownActive && !cooldownActive) {
                    betBtn.disabled = false;
                }
            }
        }

        // ==================== INISIALISASI ====================
        updateBalance();
        updateStreak();
        if (freeClaimed) {
            freeClaimBtn.disabled = true;
            freeClaimBtn.textContent = '✓ Sudah Diklaim';
        } else {
            freeClaimBtn.disabled = false;
        }

        // Format awal input taruhan
        formatBetInput(betInput);

        startCountdown();
    </script>
</body>
</html>
