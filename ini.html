<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera - Luar Angkasa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #0d1d31 0%, #0c0d13 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        /* Efek bintang */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 10px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 80px 200px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 150px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 250px 400px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 350px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 500px 600px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 700px 300px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 900px 800px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            opacity: 0.6;
            animation: twinkle 4s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 0.9; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 400px;
            width: 100%;
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h2 {
            color: #a0f0f0;
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 18px;
            text-shadow: 0 0 8px #00ffff;
        }

        .video-wrapper {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 20px;
            border: 2px solid #00b8b8;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder-video {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0a1a2a, #1a2a3a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4f7a7a;
            font-size: 14px;
        }

        .btn {
            background: transparent;
            border: 2px solid #00b8b8;
            color: #00b8b8;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 12px;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: #00b8b8;
            color: #0a1a1a;
            box-shadow: 0 0 20px #00b8b8;
        }

        .btn-secondary {
            border-color: #6b8a8a;
            color: #b0d0d0;
        }

        .btn-secondary:hover {
            background: #6b8a8a;
            color: #0a1a1a;
            box-shadow: 0 0 20px #6b8a8a;
        }

        .status-text {
            color: #b0d0d0;
            font-size: 14px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📷 KAMERA ANGKASA</h2>

        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline style="display: none;"></video>
            <div id="placeholder" class="placeholder-video">
                <span>🔭 Kamera belum aktif</span>
            </div>
        </div>

        <button class="btn" id="requestBtn">🔓 IJINKAN KAMERA</button>
        <button class="btn btn-secondary" id="backBtn" onclick="window.location.href='kontrol.html'">◀ KEMBALI</button>

        <div class="status-text" id="status">Status: Menunggu izin...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const placeholder = document.getElementById('placeholder');
        const requestBtn = document.getElementById('requestBtn');
        const statusEl = document.getElementById('status');
        let stream = null;

        // Cek apakah izin sudah pernah diberikan
        function checkPermission() {
            const perm = localStorage.getItem('cameraPermission');
            if (perm === 'granted') {
                startCamera();
            } else {
                // Tampilkan placeholder
                video.style.display = 'none';
                placeholder.style.display = 'flex';
                statusEl.textContent = 'Status: Izin belum diberikan';
            }
        }

        // Memulai kamera
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block';
                placeholder.style.display = 'none';
                statusEl.textContent = 'Status: Kamera aktif';
                localStorage.setItem('cameraPermission', 'granted');
            } catch (err) {
                console.error(err);
                statusEl.textContent = 'Status: Gagal mengakses kamera';
                alert('Tidak dapat mengakses kamera. Pastikan izin diberikan.');
            }
        }

        // Minta izin saat tombol diklik
        requestBtn.addEventListener('click', async () => {
            try {
                // Minta izin
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block';
                placeholder.style.display = 'none';
                statusEl.textContent = 'Status: Kamera aktif';
                localStorage.setItem('cameraPermission', 'granted');
            } catch (err) {
                statusEl.textContent = 'Status: Izin ditolak';
                alert('Izin kamera ditolak. Periksa pengaturan browser Anda.');
            }
        });

        // Saat halaman dimuat, cek izin
        window.addEventListener('load', checkPermission);

        // Bersihkan stream saat pindah halaman (opsional)
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
